name: Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: Build CLI
        run: npx tsc
        working-directory: cli

      - name: Generate CLI manifest
        run: npx oclif manifest
        working-directory: cli

      - name: Install example plugins
        run: npm install
        working-directory: examples/hello

      - name: Test
        run: npx vitest run
