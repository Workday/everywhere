version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    cooldown:
      default-days: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
    cooldown:
      default-days: 3
