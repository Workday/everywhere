name: Feature Request
description: Suggest a new feature or enhancement for the Workday Everywhere SDK
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill out the sections below to help us understand your idea.

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Provide a clear and concise description of the feature you'd like to see.
      placeholder: |
        Example: I would like the `everywhere build` command to support minification of the output bundle.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description:
        Explain the problem or need this feature would address. Help us understand why this is
        important to you.
      placeholder: |
        Example: Our plugin bundles are large because they include unminified library code. This increases load times for end users.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: How would you use this feature?
      description: Walk us through a typical scenario where you'd use this feature.
      placeholder: |
        Example:
        1. Run `npx everywhere build --minify`
        2. The output zip contains a minified plugin.js
        3. Upload the smaller bundle for faster delivery
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: How do you imagine this working?
      description: |
        Describe how you think this feature should work. Don't worry about implementation details — just describe the developer experience you'd like to see.
      placeholder: |
        Example: A `--minify` flag on the build command that enables esbuild minification. Could also be a config option in package.json.

  - type: textarea
    id: alternatives
    attributes:
      label: Have you tried any workarounds?
      description:
        Are there any current workarounds you're using? What other solutions have you considered?
      placeholder: |
        Example: I'm running a separate esbuild step after the build to minify, but this is fragile and doesn't integrate with the zip packaging.

  - type: textarea
    id: examples
    attributes:
      label: Examples or References
      description: |
        Are there any other tools or SDKs that do something similar? Feel free to share links, screenshots, or examples.
      placeholder: |
        Example: Vite's `build` command minifies by default and has a `--minify` flag to control it.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      description: Help us understand the priority from your perspective.
      options:
        - 'Nice to have - would be convenient'
        - 'Important - would improve my workflow significantly'
        - 'Critical - I really need this to use the SDK effectively'
        - 'Unsure'
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Add any other context, ideas, or considerations about the feature request here.
      placeholder: Any additional information that might be helpful.
